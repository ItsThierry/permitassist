<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PermitAssist Review Queue</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px 56px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 14px; padding: 18px 20px; margin-bottom: 16px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    .muted { color: #94a3b8; font-size: 14px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    input, button { font: inherit; }
    input { flex: 1; min-width: 260px; border-radius: 10px; border: 1px solid #475569; background: #0b1220; color: #f8fafc; padding: 12px 14px; }
    button { border: none; border-radius: 10px; background: #2563eb; color: white; font-weight: 700; padding: 12px 16px; cursor: pointer; }
    .item { border: 1px solid #334155; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; background: #0b1220; }
    .item-title { font-weight: 800; margin-bottom: 6px; }
    .badge { display: inline-block; border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 700; margin-right: 6px; }
    .badge-red { background: rgba(239,68,68,.14); color: #f87171; }
    .badge-yellow { background: rgba(245,158,11,.14); color: #fbbf24; }
    .badge-blue { background: rgba(59,130,246,.14); color: #60a5fa; }
    ul { margin: 8px 0 0 18px; color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>PermitAssist Review Queue</h1>
      <div class="muted">Internal queue for flagged results and answers that still need review.</div>
    </div>

    <div class="card">
      <h2>Admin token</h2>
      <div class="row">
        <input id="admin-token" type="password" placeholder="Paste PERMITASSIST_ADMIN_TOKEN" />
        <button onclick="loadQueue()">Load queue</button>
      </div>
      <div class="muted" style="margin-top:10px">Stored locally in this browser only.</div>
    </div>

    <div class="card">
      <h2>Needs review</h2>
      <div id="needs-review"><div class="muted">Load the queue to see results that need a human pass.</div></div>
    </div>

    <div class="card">
      <h2>Feedback / flagged wrong</h2>
      <div id="feedback-list"><div class="muted">Load the queue to see user-submitted issues.</div></div>
    </div>
  </div>

  <script>
    const KEY = 'permitassist_admin_token';
    const input = document.getElementById('admin-token');
    input.value = localStorage.getItem(KEY) || '';

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadQueue() {
      const token = input.value.trim();
      if (!token) { alert('Enter the admin token first.'); return; }
      localStorage.setItem(KEY, token);
      const needs = document.getElementById('needs-review');
      const feedback = document.getElementById('feedback-list');
      needs.innerHTML = '<div class="muted">Loading…</div>';
      feedback.innerHTML = '<div class="muted">Loading…</div>';
      try {
        const r = await fetch('/api/review-queue?limit=100', { headers: { 'X-Admin-Token': token } });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Could not load review queue');

        const nr = d.needs_review || [];
        const fb = d.feedback || [];

        needs.innerHTML = nr.length ? nr.map(item => `
          <div class="item">
            <div class="item-title">${esc(item.job_type)} · ${esc(item.city)}, ${esc(item.state)}</div>
            <div><span class="badge badge-yellow">${esc(item.confidence || 'review')}</span><span class="badge badge-blue">${esc((item.missing_fields || []).join(', ') || 'needs review')}</span></div>
            <div class="muted" style="margin-top:8px">${esc(item.confidence_reason || '')}</div>
          </div>
        `).join('') : '<div class="muted">No review-needed results right now.</div>';

        feedback.innerHTML = fb.length ? fb.map(item => `
          <div class="item">
            <div class="item-title">${esc(item.job_type)} · ${esc(item.city)}, ${esc(item.state)}</div>
            <div><span class="badge badge-red">flagged</span></div>
            <div style="margin-top:8px">${esc(item.issue || '')}</div>
            <div class="muted" style="margin-top:8px">${esc(item.submitted_at || '')}</div>
          </div>
        `).join('') : '<div class="muted">No flagged feedback right now.</div>';
      } catch (e) {
        needs.innerHTML = `<div class="muted">${esc(e.message)}</div>`;
        feedback.innerHTML = `<div class="muted">${esc(e.message)}</div>`;
      }
    }
  </script>
</body>
</html>
